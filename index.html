<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>貪食蛇 Snake Garden</title>
<meta name="description" content="支援單人與多人包廂對戰的貪食蛇遊戲">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
<style>
  .hidden{display:none !important}
  :root{
    --page:#101D16;
    --panel:#18291F;
    --panel-edge:#2A4332;
    --text:#EAF3E4;
    --text-dim:#9DB6A3;
    --accent:#F2C14E;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior:none}
  body{
    min-height:100svh;
    background:radial-gradient(1200px 700px at 50% -10%, #1A3023 0%, var(--page) 60%);
    color:var(--text);
    font-family:'Noto Sans TC',system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    /* 讓整個佈局剛好塞進視窗，不超出、不需滾動 */
    height:100svh;
    padding:6px 12px 6px;gap:5px;
    overflow:hidden;
  }
  header{text-align:center;flex-shrink:0}
  header h1{
    font-family:'Fredoka','Noto Sans TC',sans-serif;
    font-weight:600;font-size:clamp(17px,4vw,28px);letter-spacing:.04em;
  }
  header h1 .en{color:var(--accent)}

  /* 主選單道具說明 — 貼齊頂部 */
  .home-legend{
    position:absolute;top:0;left:0;right:0;
    display:flex;flex-wrap:wrap;justify-content:center;
    gap:4px 12px;font-size:11.5px;color:var(--text-dim);
    background:rgba(0,0,0,0.30);
    border-radius:12px 12px 0 0;
    padding:7px 10px;
  }
  .home-legend b{color:var(--text);font-weight:500}
  /* 主選單中央內容區 */
  .home-center{
    display:flex;flex-direction:column;align-items:center;gap:12px;
  }

  .stats{display:flex;gap:6px;width:min(96vw,560px);flex-shrink:0}
  .chip{flex:1;background:var(--panel);border:1px solid var(--panel-edge);border-radius:10px;padding:5px 6px;text-align:center}
  .chip .k{font-size:10px;color:var(--text-dim);letter-spacing:.1em;margin-bottom:1px}
  .chip .v{font-family:'Fredoka','Noto Sans TC',sans-serif;font-weight:600;font-size:17px;font-variant-numeric:tabular-nums}
  .chip .v.gold{color:var(--accent)}

  /* 穿牆模式在棋盤上方(單人) */
  .wrap-bar{
    width:min(96vw,560px);display:flex;align-items:center;gap:8px;
    font-size:12px;color:var(--text-dim);flex-shrink:0;
  }
  .wrap-bar input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}
  .wrap-bar label{cursor:pointer;user-select:none}

  .stats{display:flex;gap:6px;width:min(96vw,560px);flex-shrink:0}
  .chip{flex:1;background:var(--panel);border:1px solid var(--panel-edge);border-radius:10px;padding:5px 6px;text-align:center}
  .chip .k{font-size:10px;color:var(--text-dim);letter-spacing:.1em;margin-bottom:1px}
  .chip .v{font-family:'Fredoka','Noto Sans TC',sans-serif;font-weight:600;font-size:17px;font-variant-numeric:tabular-nums}
  .chip .v.gold{color:var(--accent)}

  .wrap-bar{
    width:min(96vw,560px);display:flex;align-items:center;gap:8px;
    font-size:12px;color:var(--text-dim);flex-shrink:0;
  }
  .wrap-bar input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}
  .wrap-bar label{cursor:pointer;user-select:none}

  /* 棋盤區：寬度撐滿，高度靠 flex:1 填滿剩餘空間，但最多不超過寬度的 1.2 倍（長方形） */
  .board-wrap{
    position:relative;
    width:min(96vw,560px);
    flex:1;
    min-height:0;
    max-height:calc(min(96vw,560px) * 1.25);
    border-radius:18px;padding:7px;
    background:linear-gradient(180deg,#4C7A36,#3B6129);
    box-shadow:0 10px 28px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.14);
  }
  canvas#game{
    display:block;
    width:100%;height:100%;
    border-radius:10px;touch-action:none;user-select:none;
  }

  .screen{
    position:absolute;inset:8px;border-radius:12px;
    background:rgba(14,26,16,.88);backdrop-filter:blur(4px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;text-align:center;padding:16px;overflow-y:auto;
  }
  .screen.hidden{display:none}
  .screen .big{font-family:'Fredoka','Noto Sans TC',sans-serif;font-weight:600;font-size:clamp(20px,5vw,28px);text-shadow:0 2px 8px rgba(0,0,0,.4)}
  .screen .small{font-size:12px;font-weight:500;color:#C9DCC0;line-height:1.6}
  .btn{
    font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:15px;
    padding:9px 28px;background:var(--accent);color:#3A2B07;border:none;border-radius:999px;
    cursor:pointer;box-shadow:0 3px 0 #B98A23;transition:transform .08s ease;
  }
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #B98A23}
  .btn.ghost{background:transparent;color:var(--text);border:1.5px solid var(--panel-edge);box-shadow:none}
  .btn.ghost:active{transform:translateY(1px)}
  .btn.wide{min-width:180px}
  .field{display:flex;flex-direction:column;gap:5px;align-items:center}
  .field label{font-size:11px;color:var(--text-dim);letter-spacing:.1em}
  .field input,.field select{
    font-family:'Fredoka','Noto Sans TC',sans-serif;font-size:16px;text-align:center;
    background:#0E1A12;color:var(--text);border:1.5px solid var(--panel-edge);
    border-radius:10px;padding:7px 12px;width:170px;outline:none;
  }
  .field input:focus,.field select:focus{border-color:var(--accent)}

  /* 包廂號碼更緊湊 */
  .room-code{
    font-family:'Fredoka',monospace;font-size:22px;font-weight:600;letter-spacing:.3em;
    color:var(--accent);background:#0E1A12;border:1.5px dashed var(--panel-edge);
    border-radius:10px;padding:5px 14px 5px 18px;
  }

  .skin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;width:100%}
  .skin{
    background:#0E1A12;border:2px solid var(--panel-edge);border-radius:10px;
    padding:5px 4px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;
  }
  .skin.sel{border-color:var(--accent);background:#1B2A14}
  .skin canvas{width:100%;height:28px}
  .skin span{font-size:10px;color:var(--text-dim)}
  .skin.sel span{color:var(--accent)}
  .skin{position:relative}
  .skin.locked{opacity:0.28;cursor:not-allowed;filter:grayscale(1)}
  .skin.locked:after{
    content:'';position:absolute;inset:0;border-radius:10px;
    background:rgba(0,0,0,0.55);
  }
  .skin.confirmed-badge:after{
    content:'✓';position:absolute;inset:0;border-radius:10px;
    background:rgba(30,90,30,0.6);color:#7FE0A0;
    font-size:20px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
  }
  .btn-confirm{
    font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:14px;
    padding:8px 24px;background:#3D9B57;color:#fff;border:none;border-radius:999px;
    cursor:pointer;box-shadow:0 3px 0 #286B3A;transition:transform .08s;
  }
  .btn-confirm:active{transform:translateY(2px);box-shadow:0 1px 0 #286B3A}
  .btn-confirm.done{background:#286B3A;opacity:0.7;pointer-events:none}
  .countdown-overlay{
    position:absolute;inset:0;border-radius:12px;
    background:rgba(10,20,12,0.52);
    display:none;flex-direction:column;align-items:center;justify-content:center;
  }
  .countdown-overlay.show{display:flex}
  .countdown-num{
    font-family:'Fredoka',sans-serif;font-weight:600;
    font-size:clamp(90px,20vw,170px);
    color:#fff;line-height:1;
    text-shadow:0 4px 32px rgba(0,0,0,.55);
    transition:transform .12s ease, opacity .12s ease;
  }
  .countdown-num.pop{transform:scale(1.4);opacity:0}
  .countdown-go{
    font-family:'Fredoka',sans-serif;font-weight:600;
    font-size:clamp(40px,9vw,72px);
    color:var(--accent);
    text-shadow:0 2px 18px rgba(0,0,0,.45);
  }

  .member-list{
    width:200px;background:#0E1A12;border:1.5px solid var(--panel-edge);
    border-radius:10px;padding:6px 10px;display:flex;flex-direction:column;gap:5px;
    max-height:100px;overflow-y:auto;
  }
  .member-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text)}
  .member-row .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .member-row .you{color:var(--accent);font-size:10px}
  .member-row.waiting{color:var(--text-dim);font-style:italic}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

  .legend{
    width:min(94vw,560px);background:var(--panel);border:1px solid var(--panel-edge);
    border-radius:12px;padding:7px 10px;display:flex;flex-wrap:wrap;justify-content:center;
    gap:4px 12px;font-size:11.5px;color:var(--text-dim);
  }
  .legend b{color:var(--text);font-weight:500}

  /* ===== 新版方向鍵:仿實體按鍵 ===== */
  .controls{
    display:flex;align-items:center;justify-content:center;gap:20px;
    width:min(96vw,560px);flex-shrink:0;
  }
  .dpad{
    display:grid;
    grid-template-columns:60px 60px 60px;
    grid-template-rows:44px 44px 44px;
    gap:4px;
  }
  /* 上下合為一個長形按鍵(上半/下半) */
  .dpad-ud{
    grid-area:1/2/3/3;
    display:flex;flex-direction:column;gap:0;
    border-radius:14px;overflow:hidden;
    box-shadow:0 4px 0 rgba(0,0,0,.45);
  }
  .dpad-ud button{
    flex:1;background:#2A3D2E;border:1px solid #3D5A40;
    color:var(--text);font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    border-radius:0;
  }
  .dpad-ud button:first-child{border-bottom:1px solid #3D5A40;border-radius:14px 14px 0 0}
  .dpad-ud button:last-child{border-radius:0 0 14px 14px}
  .dpad-ud button:active{background:#1C2A1E}

  /* 左右各一個正方形按鍵 */
  .dpad-l,.dpad-r{
    grid-row:2/3;
    background:#2A3D2E;border:1px solid #3D5A40;
    border-radius:14px;color:var(--text);font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 0 rgba(0,0,0,.45);
  }
  .dpad-l{grid-column:1/2}
  .dpad-r{grid-column:3/4}
  .dpad-l:active,.dpad-r:active{background:#1C2A1E;transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.45)}

  /* 方向鍵箭頭 SVG */
  .arrow{width:18px;height:18px;fill:none;stroke:var(--text);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

  /* 中央暫停鍵(單人) */
  .pause-wrap{
    display:flex;flex-direction:column;align-items:center;gap:6px;
  }
  #pause-btn{
    width:48px;height:48px;border-radius:50%;
    background:#2A3D2E;border:1px solid #3D5A40;
    color:var(--accent);font-family:'Fredoka',sans-serif;font-size:13px;
    cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center;
  }
  #pause-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.4)}
  .pause-label{font-size:10px;color:var(--text-dim)}

  .hint{font-size:11px;color:var(--text-dim);text-align:center;max-width:480px;line-height:1.7}
  kbd{font-family:'Fredoka',monospace;font-size:10px;background:var(--panel);border:1px solid var(--panel-edge);border-radius:4px;padding:1px 5px}

  /* 電腦隱藏方向鍵 */
  @media (hover:hover) and (pointer:fine){
    .dpad,.pause-wrap,.hint{display:none}
  }
</style>
</head>
<body>

<header>
  <h1>貪食蛇 <span class="en">Snake Garden</span></h1>
</header>

<div class="stats">
  <div class="chip"><div class="k" id="k1">分數</div><div class="v" id="v1">0</div></div>
  <div class="chip"><div class="k" id="k2">速度</div><div class="v" id="v2">1</div></div>
  <div class="chip"><div class="k" id="k3">最高分</div><div class="v gold" id="v3">0</div></div>
  <div class="chip hidden" id="chip4"><div class="k" id="k4">目前領先</div><div class="v" id="v4" style="font-size:15px">-</div></div>
</div>

<!-- 穿牆模式(單人遊戲中才顯示) -->
<div class="wrap-bar hidden" id="wrap-bar">
  <input type="checkbox" id="wrap-toggle">
  <label for="wrap-toggle">穿牆模式</label>
</div>

<div class="board-wrap">
  <canvas id="game" width="840" height="1050" aria-label="貪食蛇遊戲畫面" role="img"></canvas>

  <div class="screen" id="sc-home">
    <!-- 道具說明固定在最上方 -->
    <div class="home-legend">
      <span>🍎 <b>+1格</b></span>
      <span>🍌 <b>+2格</b></span>
      <span>⭐ <b>無敵10秒</b></span>
      <span>🪳 <b>−1格</b></span>
      <span>💣 <b>−3格</b></span>
    </div>
    <div class="home-center">
      <div class="big">Snake Garden</div>
      <div class="field">
        <label>玩家名稱（必填）</label>
        <input id="global-name" maxlength="8" placeholder="輸入你的名字" autocomplete="off">
        <span id="switch-player" style="font-size:11px;color:var(--text-dim);cursor:pointer;text-decoration:underline;margin-top:2px">更換玩家</span>
      </div>
      <button class="btn wide" id="bt-single">單人模式</button>
      <button class="btn wide ghost" id="bt-multi">多人模式</button>
    </div>
  </div>

  <div class="screen hidden" id="sc-room">
    <div class="big">多人包廂</div>
    <button class="btn wide" id="bt-create">建立包廂</button>
    <div class="small">— 或 —</div>
    <div class="field">
      <label>輸入包廂號碼</label>
      <input id="in-code" inputmode="numeric" maxlength="6" placeholder="6 位數字">
    </div>
    <button class="btn wide ghost" id="bt-join">加入包廂</button>
    <div class="small" id="room-msg" style="color:#F09595"></div>
    <button class="btn ghost" id="bt-room-back">返回</button>
  </div>

  <div class="screen hidden" id="sc-lobby">
    <div class="big" id="lobby-title">準備開始</div>
    <div class="room-code hidden" id="lobby-code">000000</div>
    <div class="field">
      <label>選擇你的蛇</label>
      <div class="skin-grid" id="skin-grid"></div>
    </div>
    <div class="field hidden" id="f-bots">
      <label>電腦蛇數量</label>
      <select id="in-bots">
        <option>0</option><option>1</option><option selected>2</option><option>3</option>
        <option>4</option><option>5</option><option>6</option><option>7</option>
      </select>
    </div>
    <div class="field hidden" id="f-members">
      <label>包廂玩家</label>
      <div id="member-list" class="member-list"></div>
    </div>
    <div class="small hidden" id="lobby-wait">等待房主開始遊戲…</div>
    <!-- 確認角色(多人) -->
    <div class="row hidden" id="f-confirm">
      <button class="btn-confirm" id="bt-confirm">✔ 確認角色</button>
    </div>
    <div class="row">
      <button class="btn ghost" id="bt-lobby-back">返回</button>
      <button class="btn" id="bt-start">開始遊戲</button>
    </div>
  </div>

  <div class="screen hidden" id="sc-dead" style="background:rgba(14,26,16,.6)">
    <div class="big">你被淘汰了</div>
    <div class="small">可以留下來觀戰,或離開包廂</div>
    <div class="row">
      <button class="btn ghost" id="bt-leave-dead">離開包廂</button>
      <button class="btn" id="bt-spectate">繼續觀戰</button>
    </div>
  </div>

  <div class="screen hidden" id="sc-pause">
    <div class="big">暫停中</div>
    <div class="small">點繼續或再次點暫停鍵恢復</div>
    <button class="btn" id="bt-resume">繼續</button>
  </div>

  <div class="screen hidden" id="sc-over">
    <div class="big" id="ov-title">遊戲結束</div>
    <div class="small" id="ov-sub"></div>
    <div class="row">
      <button class="btn ghost" id="bt-home1">回主選單</button>
      <button class="btn" id="bt-again">再玩一次</button>
    </div>
  </div>

  <div class="screen hidden" id="sc-result" style="background:transparent;backdrop-filter:none;justify-content:flex-end;pointer-events:none;padding-bottom:20px">
    <div class="row" style="pointer-events:auto;gap:8px;flex-wrap:wrap;justify-content:center">
      <button class="btn ghost" id="bt-back-lobby" style="font-size:14px;padding:8px 18px">回到包廂</button>
      <button class="btn" id="bt-again2" style="font-size:14px;padding:8px 18px">再玩一局</button>
      <button class="btn ghost" id="bt-home2" style="font-size:14px;padding:8px 18px">回到首頁</button>
    </div>
  </div>

  <!-- 倒數畫面(蓋在所有 screen 上) -->
  <div class="countdown-overlay" id="cd-overlay">
    <div class="countdown-num" id="cd-num">3</div>
  </div>
</div>

<!-- 方向鍵 + 暫停 -->
<div class="controls">
  <div class="dpad">
    <!-- 上下合體長按鍵 -->
    <div class="dpad-ud">
      <button data-dir="up" aria-label="向上">
        <svg class="arrow" viewBox="0 0 24 24"><polyline points="6 15 12 9 18 15"/></svg>
      </button>
      <button data-dir="down" aria-label="向下">
        <svg class="arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
    <!-- 左 -->
    <button class="dpad-l" data-dir="left" aria-label="向左">
      <svg class="arrow" viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
    </button>
    <!-- 右 -->
    <button class="dpad-r" data-dir="right" aria-label="向右">
      <svg class="arrow" viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>
  <!-- 暫停(單人才顯示) -->
  <div class="pause-wrap" id="pause-wrap">
    <button id="pause-btn" aria-label="暫停或繼續">II</button>
    <span class="pause-label">暫停</span>
  </div>
</div>

  {h:{x:8, y:5},   d:{x:1, y:0}},  {h:{x:19,y:29}, d:{x:-1,y:0}},

/* 連線狀態 */

function $(id){ return document.getElementById(id); }
function now(){ return performance.now(); }
function lerp(a,b,t){ return a+(b-a)*t; }

/* ============ 蛇物件 ============ */
function makeSnake(name, skinIdx, spawn, pid){
  var cells = [];
  for(var i=0;i<4;i++){
    cells.push({x: spawn.h.x - spawn.d.x*i, y: spawn.h.y - spawn.d.y*i});
  }
  return {
    pid:pid||null, name:name, skin:SKINS[skinIdx], skinIdx:skinIdx, isAI:false,
    cells:cells, prev:cells.map(cp), dir:{x:spawn.d.x,y:spawn.d.y}, queue:[],
    grow:0, alive:true,
    stunUntil:0, invUntil:0, mouthUntil:0,
    face:{type:'normal', until:0},
    deathOrder:0, finalLen:4, movedThisTick:false
  };
}
function cp(c){ return {x:c.x, y:c.y}; }
function len(s){ return s.cells.length; }
function inv(s){ return now() < s.invUntil; }
function stunned(s){ return now() < s.stunUntil; }

/* ============ 場地 ============ */
function cellOwner(x,y,except){
  for(var i=0;i<snakes.length;i++){
    var s = snakes[i];
    if(!s.alive || s===except) continue;
    for(var j=0;j<s.cells.length;j++){
      if(s.cells[j].x===x && s.cells[j].y===y) return {s:s, idx:j};
    }
  }
  return null;
}
function occupied(x,y){
  if(cellOwner(x,y,null)) return true;
  for(var i=0;i<foods.length;i++) if(foods[i].x===x && foods[i].y===y) return true;
  if(special && special.x===x && special.y===y) return true;
  return false;
}
function randFree(){
  for(var t=0;t<300;t++){
    var x = Math.floor(Math.random()*COLS), y = Math.floor(Math.random()*ROWS);
    if(!occupied(x,y)) return {x:x,y:y};
  }
  return null;
}
function aliveSnakes(){ return snakes.filter(function(s){return s.alive;}); }
function targetFoodCount(){
  if(mode==='single' && snakes.length===1) return 1;
  return Math.max(2, Math.ceil(aliveSnakes().length*0.7));
}
function replenishFoods(){
  while(foods.length < targetFoodCount()){
    var p = randFree();
    if(!p) break;
    foods.push(p);
  }
}
function spawnSpecial(){
  var p = randFree();
  if(!p) return;
  var r = Math.random();
  var type = r<0.35?'banana': r<0.50?'star': r<0.80?'roach':'bomb';
  special = {type:type, x:p.x, y:p.y, expireAt: now()+9000};
}

/* ============ 特效 ============ */
function ringFx(x,y,col){ fxRings.push({x:x,y:y,t:now(),col:col||C.ring}); }
function explodeFx(cx,cy,n,cols){
  for(var i=0;i<n;i++){
    var a = Math.random()*Math.PI*2, sp = 0.06+Math.random()*0.18;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.04,
      life:380+Math.random()*300,max:680,size:3+Math.random()*4,
      col:cols[Math.floor(Math.random()*cols.length)]});
  }
}
function deathFx(s){
  var h = s.cells[0];
  if(h) explodeFx(h.x*CELL+CELL/2, h.y*CELL+CELL/2, 14, [s.skin.body,'#FFFFFF','#A0A0A0']);
}

/* ============ 道具效果 ============ */
function applyFood(s, fi){
  s.grow += 1;
  if(mode==='single') addSingleScore(10);
  ringFx(foods[fi].x, foods[fi].y, C.ring);
  foods.splice(fi,1);
}
function applySpecial(s){
  var t = now();
  if(special.type==='banana'){
    s.grow += 2;
    if(mode==='single') addSingleScore(20);
    ringFx(special.x, special.y, 'rgba(245,213,71,0.9)');
  } else if(special.type==='star'){
    s.invUntil = t + 10000;
    if(mode==='single') addSingleScore(50);
    ringFx(special.x, special.y, 'rgba(255,230,120,0.95)');
  } else if(special.type==='roach'){
    if(mode==='single') addSingleScore(-10);
    shrink(s,1);
    s.face = {type:'pain', until:t+2500};
  } else {
    if(mode==='single') addSingleScore(-30);
    shrink(s,3);
    s.face = {type:'soot', until:t+3000};
    explodeFx(special.x*CELL+CELL/2, special.y*CELL+CELL/2, 18, ['#FFB13B','#FF7438','#FFD66B','#A0A0A0']);
    ringFx(special.x, special.y, 'rgba(255,150,60,0.9)');
  }
  special = null;
}
function shrink(s,n){ while(n-->0 && len(s)>MIN_LEN) s.cells.pop(); }

function addSingleScore(n){
  singleScore = Math.max(0, singleScore+n);
  if(singleScore > bestSingle){
    bestSingle = singleScore;
    try { localStorage.setItem('snake-best', String(bestSingle)); } catch(e){}
  }
  var nl = Math.min(3, 1 + Math.floor(singleScore/150));
  if(nl !== singleLevel){ singleLevel = nl; restartTimer(); }
  updateHud();
}

/* ============ 死亡與勝負 ============ */
function kill(s){
  if(!s.alive) return;
  s.alive = false;
  s.finalLen = len(s);
  s.deathOrder = ++deathCounter;
  deathFx(s);
  if(mode==='single' && s===player) endSingle();
  if(mode==='multi' && isHost && s===player) show('sc-dead');
}
function checkMultiEnd(){
  if(aliveSnakes().length <= 1) finishMulti();
}
function rankSnakes(){
  return snakes.slice().sort(function(x,y){
    if(x.alive !== y.alive) return x.alive ? -1 : 1;
    if(x.deathOrder !== y.deathOrder) return y.deathOrder - x.deathOrder;
    var lx = x.alive?len(x):x.finalLen, ly = y.alive?len(y):y.finalLen;
    return ly - lx;
  });
}
function finishMulti(){
  clearInterval(timer);
  var ranked = rankSnakes();
  ranked.forEach(function(s){ if(s.alive) s.finalLen = len(s); });
  resultRanks = ranked;
  sendToSheet(ranked);
  if(isHost && roomRef){
    var payload = ranked.map(function(s){
      return {nm:s.name, k:s.skinIdx, ln:s.finalLen};
    });
    /* 先寫結果，再設 state=done，所有人透過 state listener 同步顯示 */
    roomRef.child('results').set(payload).then(function(){
      roomRef.child('state').set('done');
    });
  }
  /* 房主自己也顯示 */
  state = 'results';
  showResultScreen();
}
function showResultScreen(){
  var isMulti = mode === 'multi';
  /* 單人結果用 sc-over，多人用 sc-result */
  if(!isMulti){ return; }
  $('bt-back-lobby').classList.toggle('hidden', !isHost);
  show('sc-result');
}
function endSingle(){
  clearInterval(timer);
  state = 'over';
  var finalLen = len(player);
  player.finalLen = finalLen;
  $('ov-title').textContent = '遊戲結束';
  $('ov-sub').textContent = '得分 ' + singleScore + ' 分.長度 ' + finalLen + ' 格.最高 ' + bestSingle + ' 分';
  show('sc-over');
  sendToSheet([player]);
}
function winSingle(){
  clearInterval(timer);
  state = 'over';
  player.finalLen = len(player);
  $('ov-title').textContent = '你贏了!';
  $('ov-sub').textContent = '小蛇佔滿了整座花園!得分 ' + singleScore + ' 分';
  show('sc-over');
  sendToSheet([player]);
}

/* ============ Google 試算表 ============ */
function sendToSheet(ranked){
  if(!SHEET_URL) return;
  try{
    var device = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? '手機' : '電腦';
    var rows = ranked.map(function(s){
      return {
        time: new Date().toLocaleString('zh-TW'),
        name: s.name || '玩家',
        length: s.finalLen || len(s) || 0,
        device: device,
        mode: mode==='single' ? '單人' : '多人'
      };
    });
    var body = new URLSearchParams();
    body.append('payload', JSON.stringify(rows));
    fetch(SHEET_URL, {method:'POST', mode:'no-cors', body:body})
      .catch(function(){});
    /* 備用:用 img ping 確保送出 */
    var img = new Image();
    img.src = SHEET_URL + '?payload=' + encodeURIComponent(JSON.stringify(rows));
  }catch(e){ console.error('sendToSheet error', e); }
}

/* ============ AI(僅單人模式的電腦蛇) ============ */
function aiThink(s){
  var dirs = [s.dir, {x:s.dir.y,y:-s.dir.x}, {x:-s.dir.y,y:s.dir.x}];
  var best = null, bestScore = -1e9;
  var targets = foods.slice();
  if(special && (special.type==='banana'||special.type==='star')) targets.push(special);
  for(var i=0;i<dirs.length;i++){
    var d = dirs[i];
    var nx = s.cells[0].x + d.x, ny = s.cells[0].y + d.y;
    var sc = (i===0?0.4:0) + Math.random()*0.3;
    if(wrap || inv(s)){ nx=(nx+COLS)%COLS; ny=(ny+ROWS)%ROWS; }
    else if(nx<0||nx>=COLS||ny<0||ny>=ROWS){ sc -= 1000; }
    if(sc > -500 && !inv(s)){
      var o = cellOwner(nx,ny,null);
      if(o){
        if(o.s===s) sc -= 1000;
        else if(inv(o.s)) sc -= 200;
        else if(len(s) > len(o.s) && o.idx>0) sc += 2;
        else sc -= 800;
      }
      if(special && special.x===nx && special.y===ny &&
         (special.type==='roach'||special.type==='bomb')) sc -= 50;
    }
    if(sc > -500){
      var bd = 1e9;
      for(var f=0;f<targets.length;f++){
        var dd = Math.abs(targets[f].x-nx)+Math.abs(targets[f].y-ny);
        if(dd<bd) bd=dd;
      }
      sc += Math.max(0, 40-bd)*0.25;
      var look = cellOwner(nx+d.x, ny+d.y, s);
      if(look && !inv(s) && len(s)<=len(look.s)) sc -= 3;
    }
    if(sc > bestScore){ bestScore = sc; best = d; }
  }
  if(best) s.dir = best;
}

/* ============ 主迴圈(房主/單人執行) ============ */
function tick(){
  var t = now();
  var alive = aliveSnakes();

  alive.forEach(function(s){
    s.prev = s.cells.map(cp);
    s.movedThisTick = false;
  });

  var movers = alive.filter(function(s){ return !stunned(s); });
  movers.forEach(function(s){
    if(s.isAI){ aiThink(s); }
    else if(s.queue.length){
      var nd = s.queue.shift();
      if(!(nd.x===-s.dir.x && nd.y===-s.dir.y)) s.dir = nd;
    }
  });

  var plans = [];
  movers.forEach(function(s){
    var nh = {x:s.cells[0].x+s.dir.x, y:s.cells[0].y+s.dir.y};
    var wall = false;
    if(wrap || inv(s)){ nh.x=(nh.x+COLS)%COLS; nh.y=(nh.y+ROWS)%ROWS; }
    else if(nh.x<0||nh.x>=COLS||nh.y<0||nh.y>=ROWS){ wall = true; }
    plans.push({s:s, nh:nh, wall:wall, skip:false});
  });

  for(var i=0;i<plans.length;i++){
    for(var j=i+1;j<plans.length;j++){
      var A = plans[i], B = plans[j];
      if(A.skip||B.skip||A.wall||B.wall) continue;
      if(!A.s.alive||!B.s.alive) continue;
      if(inv(A.s)||inv(B.s)) continue;
      var sameCell = A.nh.x===B.nh.x && A.nh.y===B.nh.y;
      var swap = A.nh.x===B.s.cells[0].x && A.nh.y===B.s.cells[0].y &&
                 B.nh.x===A.s.cells[0].x && B.nh.y===A.s.cells[0].y;
      if(!sameCell && !swap) continue;
      var la = len(A.s), lb = len(B.s);
      if(la > lb){ eatSnake(A.s, B.s); B.skip=true; }
      else if(lb > la){ eatSnake(B.s, A.s); A.skip=true; }
      else { stun(A.s,t); stun(B.s,t); A.skip=true; B.skip=true; }
    }
  }

  plans.sort(function(a,b){ return len(b.s)-len(a.s); });
  plans.forEach(function(p){
    var s = p.s;
    if(!s.alive || p.skip) return;
    if(p.wall){ kill(s); return; }
    var nh = p.nh;
    var o = cellOwner(nh.x, nh.y, null);
    if(o && o.s===s){
      var tailIdx = s.cells.length-1;
      var movingTail = (o.idx===tailIdx && s.grow===0);
      if(!movingTail && !inv(s)){ kill(s); return; }
      if(!movingTail && inv(s)) o = null;
    } else if(o && o.s!==s){
      if(inv(s) || inv(o.s)){
        o = null;
      } else if(o.idx===0){
        if(len(s) > len(o.s)){ eatSnake(s, o.s); }
        else if(len(s) < len(o.s)){ eatSnake(o.s, s); return; }
        else { stun(s,t); return; }
      } else {
        if(len(s) > len(o.s)){ cutSnake(o.s, o.idx); }
        else { stun(s,t); return; }
      }
    }
    moveSnake(s, nh);
  });

  if(special && t > special.expireAt) special = null;
  if(!special && Math.random() < 0.035) spawnSpecial();
  replenishFoods();

  snakes.forEach(function(s){
    if(s.face.type!=='normal' && t > s.face.until) s.face = {type:'normal', until:0};
  });

  lastTick = now();
  tickN++;
  if(mode==='multi' && isHost){
    publishFrame(); /* 每格廣播，Ably 夠快 */
    if(state==='play') checkMultiEnd();
  }
  updateHud();
}

function stun(s,t){
  s.stunUntil = t + 1200 + Math.random()*800;
  s.face = {type:'dizzy', until:s.stunUntil};
}
function eatSnake(big, small){
  big.mouthUntil = now() + 650;
  big.grow += Math.max(1, Math.floor(len(small)/2));
  if(small.cells[0]) ringFx(small.cells[0].x, small.cells[0].y, 'rgba(255,255,255,0.9)');
  kill(small);
}
function cutSnake(victim, idx){
  var cut = victim.cells.length - idx;
  victim.cells = victim.cells.slice(0, idx);
  if(len(victim) < MIN_LEN){ kill(victim); return; }
  victim.face = {type:'pain', until: now()+2000};
  var h = victim.cells[victim.cells.length-1];
  explodeFx(h.x*CELL+CELL/2, h.y*CELL+CELL/2, Math.min(12, cut*3), [victim.skin.body,'#FFFFFF']);
}
function moveSnake(s, nh){
  s.cells.unshift(nh);
  s.movedThisTick = true;
  for(var fi=0;fi<foods.length;fi++){
    if(foods[fi].x===nh.x && foods[fi].y===nh.y){ applyFood(s,fi); break; }
  }
  if(special && special.x===nh.x && special.y===nh.y) applySpecial(s);
  if(s.grow>0){ s.grow--; } else { s.cells.pop(); }
  if(mode==='single' && s===player && len(s)===COLS*ROWS) winSingle();
}

function delay(){
  if(mode==='multi') return isHost ? 150 : netDelay;
  var speeds = [170, 130, 100];
  return speeds[Math.min(singleLevel-1, 2)];
}function restartTimer(){ clearInterval(timer); timer = setInterval(tick, delay()); }

/* ============ 網路層（Firebase 全同步） ============ */
function fbReady(){
  if(fb.db) return true;
  if(!FIREBASE_CONFIG || typeof firebase==='undefined') return false;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    fb.db = firebase.database();
    return true;
  }catch(e){ return false; }
}
function listen(ref, ev, cb){
  ref.on(ev, cb);
  listeners.push({ref:ref, ev:ev, cb:cb});
}
function detachAll(){
  listeners.forEach(function(l){ try{ l.ref.off(l.ev, l.cb); }catch(e){} });
  listeners = [];
}
function roomMsg(t){ $('room-msg').textContent = t || ''; }

/* ============ 包廂建立 / 加入 ============ */
function createRoom(){
  if(!fbReady()){ roomMsg('尚未設定 Firebase,無法使用多人模式'); return; }
  roomMsg('建立中…');
  ablyConnect(function(){
    roomCode = String(Math.floor(100000 + Math.random()*900000));
    roomRef = fb.db.ref('rooms/' + roomCode);
    isHost = true;
    roomRef.set({host: fb.pid, state:'lobby', created: Date.now()}).then(function(){
      roomRef.onDisconnect().remove();
      ablyJoinChannel(roomCode, function(){
        ablySubscribe();
        joinAsPlayer();
        roomMsg('');
      });
    }).catch(function(){ roomMsg('連線失敗,請檢查 Firebase 設定'); });
  });
}
function joinRoom(code){
  if(!fbReady()){ roomMsg('尚未設定 Firebase,無法使用多人模式'); return; }
  roomMsg('加入中…');
  fb.db.ref('rooms/' + code).once('value').then(function(snap){
    var v = snap.val();
    if(!v){ roomMsg('找不到這個包廂號碼'); return; }
    if(v.state !== 'lobby'){ roomMsg('該包廂的遊戲已經開始'); return; }
    roomCode = code;
    roomRef = fb.db.ref('rooms/' + roomCode);
    isHost = false;
    ablyConnect(function(){
      ablyJoinChannel(roomCode, function(){
        ablySubscribe();
        joinAsPlayer();
        roomMsg('');
      });
    });
  }).catch(function(){ roomMsg('連線失敗,請檢查網路'); });
}
function joinAsPlayer(){
  myPlayerRef = roomRef.child('players/' + fb.pid);
  myPlayerRef.set({name: myName()||'玩家', skin: selSkin, joined: Date.now()});
  myPlayerRef.onDisconnect().remove();
  attachRoomListeners();
  openLobbyUI();
}
function myName(){ return ($('global-name').value.trim() || ''); }
function requireName(){
  var n = myName(), inp = $('global-name');
  if(!n){
    inp.style.borderColor = '#F09595'; inp.focus();
    inp.placeholder = '請先輸入名字！'; return false;
  }
  inp.style.borderColor = '';
  try { localStorage.setItem('snake-name', n); } catch(e){}
  return true;
}
function syncMyProfile(){
  if(mode==='multi' && myPlayerRef)
    myPlayerRef.update({name: myName()||'玩家', skin: selSkin, confirmed: myConfirmed?1:0});
}
function snakeByPid(pid){
  for(var i=0;i<snakes.length;i++) if(snakes[i].pid===pid) return snakes[i];
  return null;
}

/* ============ 大廳監聽 ============ */
function attachRoomListeners(){
  listen(roomRef.child('host'), 'value', function(snap){
    _hostPid = snap.val(); renderMembers();
  });
  listen(roomRef.child('players'), 'value', function(snap){
    roomPlayers = snap.val() || {};
    if(state==='lobby') renderMembers();
  });
  listen(roomRef.child('state'), 'value', function(snap){
    var st = snap.val();
    if(st==='countdown' && !isHost && state!=='play'){
      roomRef.child('roster').once('value').then(function(rs){
        clientEnterGame(rs.val() || []);
      });
    } else if(st==='done' && !isHost && state==='play'){
      roomRef.child('results').once('value').then(function(rs){
        var payload = rs.val() || [];
        clearInterval(timer);
        resultRanks = payload.map(function(d){
          return {name:d.nm||'玩家', skin:SKINS[d.k||0], skinIdx:d.k||0,
                  alive:false, finalLen:d.ln||0, cells:[]};
        });
        state = 'results';
        showResultScreen();
      });
    } else if(st==='lobby' && (state==='results'||state==='play')){
      backToLobbyUI();
    }
  });
  /* 房主監聽玩家輸入（Firebase，低頻） */
  if(isHost){
    listen(roomRef.child('inputs'), 'child_added', onRemoteInput);
    listen(roomRef.child('inputs'), 'child_changed', onRemoteInput);
  }
  listen(roomRef, 'value', function(snap){
    if(!snap.exists() && roomRef){
      cleanupRoom(); goHome();
      roomMsg('包廂已關閉(房主離開)'); show('sc-room');
    }
  });
}
function onRemoteInput(snap){
  var pid = snap.key, v = snap.val();
  if(!v || pid===fb.pid) return;
  var s = snakeByPid(pid);
  if(s && s.alive && s.queue.length<2) s.queue.push({x:v.x, y:v.y});
}

/* ============ Ably 即時層 ============ */

function ablyConnect(onReady){
  try{
    if(ablyClient){ try{ ablyClient.close(); }catch(e){} ablyClient = null; }
    ablyClient = new Ably.Realtime({key: ABLY_KEY, echoMessages: false});
    var done = false;
    function finish(){ if(done) return; done = true; onReady(); }
    /* Ably v2 正確寫法 */
    ablyClient.connection.on('connected', function(){ finish(); });
    ablyClient.connection.on('failed', function(err){
      roomMsg('Ably 連線失敗: ' + (err&&err.reason&&err.reason.message||'未知'));
    });
    /* 若已是 connected 直接觸發 */
    if(ablyClient.connection.state === 'connected') finish();
    setTimeout(function(){ if(!done) roomMsg('Ably 連線逾時，請重試'); }, 10000);
  }catch(e){ roomMsg('Ably 錯誤: ' + e.message); }
}
function ablyJoinChannel(code, onJoined){
  ablyChannel = ablyClient.channels.get('room-' + code);
  ablyChannel.attach(function(err){
    if(err){ roomMsg('頻道加入失敗: ' + err.message); return; }
    onJoined();
  });
}
function ablySubscribe(){
  if(!ablyChannel) return;
  /* 非房主訂閱 frame */
  if(!isHost){
    ablyChannel.subscribe('frame', function(msg){
      if(state==='play') applyFrame(msg.data);
    });
  }
  /* 房主訂閱玩家輸入（備援，主要靠 Firebase inputs） */
  if(isHost){
    ablyChannel.subscribe('input', function(msg){
      var d = msg.data;
      if(!d || d.pid===fb.pid) return;
      var s = snakeByPid(d.pid);
      if(s && s.alive && s.queue.length<2) s.queue.push({x:d.x, y:d.y});
    });
  }
}
function ablyCleanup(){
  if(ablyChannel){ try{ ablyChannel.detach(); ablyChannel=null; }catch(e){} }
  if(ablyClient){ try{ ablyClient.close(); ablyClient=null; }catch(e){} }
}

/* ============ 發布遊戲幀（Ably WebSocket，超低延遲） ============ */
function publishFrame(){
  if(!ablyChannel || !isHost) return;
  var fr = {
    n: tickN,
    s: snakes.map(function(s){
      return {
        i: s.pidIdx,
        c: s.alive ? s.cells.map(function(c){ return c.y*COLS+c.x; }) : [],
        d: [s.dir.x, s.dir.y],
        a: s.alive ? 1 : 0,
        v: now()<s.invUntil ? 1 : 0,
        st: now()<s.stunUntil ? 1 : 0,
        m: now()<s.mouthUntil ? 1 : 0,
        f: s.face.type==='pain'?1:s.face.type==='soot'?2:s.face.type==='dizzy'?3:0,
        ln: s.alive ? len(s) : s.finalLen
      };
    }),
    fd: foods.map(function(f){ return f.y*COLS+f.x; }),
    sp: special ? {t:special.type, i:special.y*COLS+special.x} : null
  };
  ablyChannel.publish('frame', fr);
}

/* ============ 接收遊戲幀（非房主） ============ */
function applyFrame(fr){
  var t = now();
  netDelay = lastFrameAt ? Math.min(300, Math.max(50, t-lastFrameAt)) : 150;
  lastFrameAt = t; lastTick = t;
  var faceTypes = ['normal','pain','soot','dizzy'];
  (fr.s||[]).forEach(function(d){
    var s = snakes[d.i];
    if(!s) return;
    var wasAlive = s.alive;
    s.prev = s.cells.length ? s.cells.map(cp) : [];
    s.cells = (d.c||[]).map(function(n){ return {x:n%COLS, y:Math.floor(n/COLS)}; });
    if(!s.prev.length) s.prev = s.cells.map(cp);
    s.dir = {x:d.d[0], y:d.d[1]};
    s.alive = !!d.a;
    s.invUntil = d.v ? t+5000 : 0;
    s.stunUntil = d.st ? t+2000 : 0;
    s.mouthUntil = d.m ? t+650 : 0;
    s.face = {type: faceTypes[d.f||0]||'normal', until: t+5000};
    s.finalLen = d.ln||s.finalLen;
    s.movedThisTick = true;
    if(s===player && wasAlive && !s.alive && state==='play') show('sc-dead');
    if(wasAlive && !s.alive) deathFx({cells:s.prev, skin:s.skin});
  });
  foods = (fr.fd||[]).map(function(n){ return {x:n%COLS, y:Math.floor(n/COLS)}; });
  special = fr.sp ? {type:fr.sp.t, x:fr.sp.i%COLS, y:Math.floor(fr.sp.i/COLS), expireAt:t+9000} : null;
  updateHud();
}

/* ============ 開始遊戲（房主） ============ */
function hostStartGame(){
  var pids = Object.keys(roomPlayers);
  if(pids.length < 2){ return; }
  pids.sort(function(a,b){ return (roomPlayers[a].joined||0)-(roomPlayers[b].joined||0); });
  var spawnIdx = []; for(var k=0;k<8;k++) spawnIdx.push(k);
  spawnIdx.sort(function(){ return Math.random()-0.5; });
  resetWorld();
  var usedSkins = [], roster = [];
  pids.slice(0,8).forEach(function(pid, i){
    var pdata = roomPlayers[pid], sk = pdata.skin||0;
    if(usedSkins.indexOf(sk)>=0){ for(var x=0;x<8;x++) if(usedSkins.indexOf(x)<0){ sk=x; break; } }
    usedSkins.push(sk);
    var s = makeSnake(pdata.name||'玩家', sk, SPAWNS[spawnIdx[i]], pid);
    s.pidIdx = i;
    snakes.push(s);
    if(pid===fb.pid) player = s;
    roster.push({p:pid, nm:s.name, k:sk, i:i});
  });
  wrap = false; $('wrap-toggle').checked = false; $('wrap-bar').classList.add('hidden');
  replenishFoods();
  /* 寫 roster 到 Firebase，讓非房主取得玩家清單 */
  roomRef.child('roster').set(roster).then(function(){
    roomRef.child('inputs').remove();
    /* 透過 Ably 推送初始幀 */
    publishFrame();
    /* 300ms 後廣播倒數（確保初始幀先到） */
    setTimeout(function(){
      roomRef.child('state').set('countdown');
    }, 300);
  }).catch(function(e){ roomMsg('寫入失敗: ' + e.message); });
  state = 'play'; show(null); lastTick = now(); tickN = 0; updateHud();
  runCountdown(function(){ restartTimer(); });
}

    var s = makeSnake(r.nm||'玩家', r.k||0, SPAWNS[i%SPAWNS.length], r.p);
    s.pidIdx = r.i !== undefined ? r.i : i;
    snakes.push(s);
    if(r.p===fb.pid) player = s;
  });
  wrap = false; $('wrap-bar').classList.add('hidden');

function starPath(c2,cx,cy,R,r,rot){

function drawSpecial(t){

function drawRings(t){
  for(var i=fxRings.length-1;i>=0;i--){
    var f = fxRings[i];
    var age = (t-f.t)/320;
    if(age>=1){ fxRings.splice(i,1); continue; }
    ctx.strokeStyle = f.col;
    ctx.globalAlpha = 1-age;
    ctx.lineWidth = 3*(1-age)+1;
    ctx.beginPath();
    ctx.arc(f.x*CELL+CELL/2, f.y*CELL+CELL/2, CELL*(0.3+age*0.7), 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
function drawParticles(dt){
  for(var i=particles.length-1;i>=0;i--){
    var p = particles[i];
    p.life -= dt;
    if(p.life<=0){ particles.splice(i,1); continue; }
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 0.00022*dt;
    ctx.globalAlpha = Math.min(1, p.life/p.max+0.2);
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*Math.max(0.3,p.life/p.max),0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

function interpPoints(s, t){
  var pts = [];
  for(var i=0;i<s.cells.length;i++){
    var cur = s.cells[i];
    var prev = s.prev[i] || s.prev[s.prev.length-1] || cur;
    var jump = Math.abs(cur.x-prev.x)>1.5 || Math.abs(cur.y-prev.y)>1.5;
    pts.push({
      x:(jump?cur.x:lerp(prev.x,cur.x,t))*CELL + CELL/2,
      y:(jump?cur.y:lerp(prev.y,cur.y,t))*CELL + CELL/2
    });
  }
  return pts;
}
function splitRuns(pts){
  var runs=[], cur=[pts[0]];
  for(var i=1;i<pts.length;i++){
    var d = Math.abs(pts[i].x-pts[i-1].x)+Math.abs(pts[i].y-pts[i-1].y);
    if(d>CELL*2){ runs.push(cur); cur=[pts[i]]; } else cur.push(pts[i]);
  }
  runs.push(cur);
  return runs;
}
function tracePath(run){
  ctx.beginPath();
  ctx.moveTo(run[0].x, run[0].y);
  if(run.length===2){ ctx.lineTo(run[1].x, run[1].y); return; }
  for(var i=1;i<run.length-1;i++){
    ctx.quadraticCurveTo(run[i].x, run[i].y, (run[i].x+run[i+1].x)/2, (run[i].y+run[i+1].y)/2);
  }
  ctx.lineTo(run[run.length-1].x, run[run.length-1].y);
}
function strokeRuns(runs,color,width,offY){
  ctx.strokeStyle = color; ctx.lineWidth = width;
  for(var i=0;i<runs.length;i++){
    if(runs[i].length<2){
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(runs[i][0].x, runs[i][0].y+(offY||0), width/2, 0, Math.PI*2);
      ctx.fill();
      continue;
    }
    if(offY){ ctx.save(); ctx.translate(0,offY); }
    tracePath(runs[i]); ctx.stroke();
    if(offY){ ctx.restore(); }
  }
}
function drawFace(s,hx,hy,dx,dy,W,t){
  var er = W*0.17, fwd = W*0.16, side = W*0.30;
  var e1 = [hx+dx*fwd-dy*side, hy+dy*fwd+dx*side];
  var e2 = [hx+dx*fwd+dy*side, hy+dy*fwd-dx*side];
  var pupil = s.skin.pupil;

  if(now() < s.mouthUntil){
    var prog = 1 - (s.mouthUntil-now())/650;
    var open = Math.sin(Math.max(0,Math.min(1,prog))*Math.PI) * 0.55;
    var ang = Math.atan2(dy,dx);
    ctx.fillStyle = s.skin.body;
    ctx.beginPath();
    ctx.moveTo(hx,hy);
    ctx.arc(hx,hy,W*0.62, ang+open, ang-open+Math.PI*2);

    ctx.fillStyle = '#5E1F1F';
    ctx.beginPath();
    ctx.moveTo(hx,hy);
    ctx.arc(hx,hy,W*0.55, ang-open, ang+open);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    [e1,e2].forEach(function(e){

    });

      ctx.beginPath(); ctx.arc(e[0]-dx*W*0.05, e[1]-dy*W*0.05, er*0.55, 0, Math.PI*2); ctx.fill();
    });
    return;
  }
  if(s.face.type==='pain'){
    ctx.strokeStyle = pupil; ctx.lineWidth = 2.6; ctx.lineCap='round';
    [e1,e2].forEach(function(e){
      ctx.beginPath();
      ctx.moveTo(e[0]-er,e[1]-er); ctx.lineTo(e[0]+er,e[1]+er);
      ctx.moveTo(e[0]+er,e[1]-er); ctx.lineTo(e[0]-er,e[1]+er);
      ctx.stroke();
    });
    ctx.fillStyle = '#7A2230';
    ctx.beginPath(); ctx.ellipse(hx+dx*W*0.34, hy+dy*W*0.34, er*0.8, er*1.05, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(140,200,255,0.95)';
    ctx.beginPath();
    ctx.arc(hx-dy*W*0.55, hy+dx*W*0.55-W*0.35+Math.sin(t/110)*1.5, 3, 0, Math.PI*2);
    ctx.fill();
    return;
  }
  if(s.face.type==='soot'){
    ctx.fillStyle = 'rgba(45,42,40,0.85)';
    ctx.beginPath(); ctx.arc(hx+dx*W*0.08, hy+dy*W*0.08, W*0.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    [e1,e2].forEach(function(e){ ctx.beginPath(); ctx.arc(e[0],e[1],er*1.05,0,Math.PI*2); ctx.fill(); });
    ctx.fillStyle = '#15151A';
    [e1,e2].forEach(function(e){ ctx.beginPath(); ctx.arc(e[0],e[1],er*0.38,0,Math.PI*2); ctx.fill(); });
    var phase = (t/350)%3;
    for(var k=0;k<3;k++){
      var pr = ((phase+k)%3)/3;
      ctx.fillStyle = 'rgba(120,120,125,'+(0.5*(1-pr))+')';
      ctx.beginPath();
      ctx.arc(hx+Math.sin(t/300+k*2)*5, hy-W*0.55-pr*W*0.8, 3.5+pr*4, 0, Math.PI*2);
      ctx.fill();
    }
    return;
  }
  if(s.face.type==='dizzy'){
    ctx.strokeStyle = pupil; ctx.lineWidth = 2; ctx.lineCap='round';
    [e1,e2].forEach(function(e){
      ctx.beginPath(); ctx.arc(e[0],e[1],er*0.9, 0, Math.PI*1.6); ctx.stroke();
      ctx.beginPath(); ctx.arc(e[0],e[1],er*0.45, Math.PI, Math.PI*2.4); ctx.stroke();
    });
    for(var m=0;m<3;m++){
      var a = t/300 + m*(Math.PI*2/3);
      starPath(ctx, hx+Math.cos(a)*W*0.75, hy+Math.sin(a)*W*0.45-W*0.5, 5, 2.2, a);
      ctx.fillStyle = 'rgba(255,225,120,0.9)';
      ctx.fill();
    }
    return;
  }
  ctx.fillStyle = '#FFFFFF';
  [e1,e2].forEach(function(e){ ctx.beginPath(); ctx.arc(e[0],e[1],er,0,Math.PI*2); ctx.fill(); });
  ctx.fillStyle = pupil;
  [e1,e2].forEach(function(e){
    ctx.beginPath(); ctx.arc(e[0]+dx*er*0.35, e[1]+dy*er*0.35, er*0.55, 0, Math.PI*2); ctx.fill();
  });
}
function drawSnake(s, t, interpT){
  if(!s.cells.length) return;
  var W = CELL*0.74;
  var pts = interpPoints(s, s.movedThisTick ? interpT : 1);
  var runs = splitRuns(pts);
  ctx.lineCap='round'; ctx.lineJoin='round';
  strokeRuns(runs, C.shadow, W, 4);
  var body = s.skin.body;
  if(inv(s)){
    var left = s.invUntil - t;
    var blinkOff = left<2200 && Math.floor(t/150)%2===0;
    if(!blinkOff){
      body = 'hsl(' + ((t/4 + s.skinIdx*45)%360) + ',85%,62%)';
      strokeRuns(runs, 'rgba(255,255,255,0.35)', W+8, 0);
    }
  }
  strokeRuns(runs, body, W, 0);
  if(inv(s)){
    var n = pts.length;
    for(var k=0;k<3;k++){
      var idx = Math.floor(((t/180)+k*n/3)%n);
      var p = pts[idx];
      var tw = 0.5+0.5*Math.sin(t/120+k*2);
      ctx.strokeStyle = 'rgba(255,255,255,'+(0.5+0.5*tw)+')';
      ctx.lineWidth = 2;
      var sz = 4+3*tw;
      ctx.beginPath();
      ctx.moveTo(p.x-sz,p.y); ctx.lineTo(p.x+sz,p.y);
      ctx.moveTo(p.x,p.y-sz); ctx.lineTo(p.x,p.y+sz);
      ctx.stroke();
    }
  }
  var hx=pts[0].x, hy=pts[0].y, dx=s.dir.x, dy=s.dir.y;
  if(pts.length>1){
    var vx=pts[0].x-pts[1].x, vy=pts[0].y-pts[1].y;
    var vl=Math.sqrt(vx*vx+vy*vy);
    if(vl>1){ dx=vx/vl; dy=vy/vl; }
  }
  drawFace(s,hx,hy,dx,dy,W,t);
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function drawHudPanels(t){
  if(player && player.alive && inv(player)){
    var sLeft = Math.ceil((player.invUntil-t)/1000);
    ctx.fillStyle = 'rgba(20,30,15,0.55)';
    roundRect(12,12,116,34,17); ctx.fill();
    starPath(ctx,31,29,9,4.2,-Math.PI/2+t/600);
    ctx.fillStyle = '#F6C445'; ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '600 16px Fredoka, "Noto Sans TC", sans-serif';
    ctx.textBaseline='middle'; ctx.textAlign='left';
    ctx.fillText('無敵 '+sLeft+'s', 48, 30);
  }
  var multiBoard = (mode==='multi' || (mode==='single' && snakes.length>1));
  if(multiBoard && (state==='play'||state==='results')){
    var list = snakes.slice().sort(function(a,b){
      if(a.alive!==b.alive) return a.alive?-1:1;
      return (b.alive?len(b):b.finalLen)-(a.alive?len(a):a.finalLen);
    });
    var ph = 14 + list.length*22;
    ctx.fillStyle = 'rgba(20,30,15,0.55)';
    roundRect(canvas.width-150, 12, 138, ph, 12); ctx.fill();

    ctx.textBaseline='middle'; ctx.textAlign='left';
    list.forEach(function(s,i){
      var y = 12+16+i*22;
      ctx.globalAlpha = s.alive?1:0.45;
      ctx.fillStyle = s.skin.body;
      ctx.beginPath(); ctx.arc(canvas.width-138, y, 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      var nm = s.name.length>5 ? s.name.slice(0,5) : s.name;
      ctx.fillText(nm + (s.alive?'':' ✕'), canvas.width-126, y);
      ctx.textAlign='right';
      ctx.fillText(String(s.alive?len(s):s.finalLen), canvas.width-20, y);
      ctx.textAlign='left';
    });
    ctx.globalAlpha = 1;
    if(player && !player.alive && state==='play' && $('sc-dead').classList.contains('hidden')){
      ctx.fillStyle = 'rgba(20,30,15,0.55)';
      roundRect(canvas.width/2-60, 12, 120, 32, 16); ctx.fill();
      ctx.fillStyle = '#FFD66B';
      ctx.textAlign='center';
      ctx.font = '700 15px "Noto Sans TC", sans-serif';
      ctx.fillText('觀戰中…', canvas.width/2, 28);
      ctx.textAlign='left';
    }
  }
}
function drawMiniSnake(x, y, skin, scale, t){
  var sway = Math.sin(t/400)*2;
  ctx.save();
  ctx.translate(x,y); ctx.scale(scale,scale);
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.strokeStyle = 'rgba(38,66,18,0.25)';
  ctx.lineWidth = 16;
  snakeSPath(3); ctx.stroke();
  ctx.strokeStyle = skin.body;
  snakeSPath(0); ctx.stroke();
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.arc(-5+sway,-52,3.2,0,Math.PI*2); ctx.arc(5+sway,-52,3.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = skin.pupil;
  ctx.beginPath(); ctx.arc(-5+sway,-53,1.7,0,Math.PI*2); ctx.arc(5+sway,-53,1.7,0,Math.PI*2); ctx.fill();
  ctx.restore();
  function snakeSPath(off){
    ctx.beginPath();
    ctx.moveTo(-14, 18+off);
    ctx.quadraticCurveTo(14, 8+off, -10, -8+off);
    ctx.quadraticCurveTo(-26, -22+off, 0, -36+off);
    ctx.quadraticCurveTo(12, -46+off, 0, -50+off);
  }
}
function drawPodium(t){
  if(!resultRanks || !resultRanks.length) return;
  ctx.fillStyle = 'rgba(14,26,16,0.72)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle = '#FFFFFF';
  ctx.font = '600 40px Fredoka, "Noto Sans TC", sans-serif';
  ctx.fillText('🏆 ' + resultRanks[0].name + ' 獲勝!', canvas.width/2, 110);
  var baseY = canvas.height*0.62;
  var pw = 150;
  var defs = [
    {rank:2, x:canvas.width/2-pw-10, h:110, col:'#C7CDD6', col2:'#9AA2AE'},
    {rank:1, x:canvas.width/2,        h:160, col:'#F2C14E', col2:'#C8932A'},
    {rank:3, x:canvas.width/2+pw+10,  h:75,  col:'#D29A6B', col2:'#A87045'}
  ];
  defs.forEach(function(d){
    var s = resultRanks[d.rank-1];
    var g = ctx.createLinearGradient(0, baseY-d.h, 0, baseY);
    g.addColorStop(0,d.col); g.addColorStop(1,d.col2);
    ctx.fillStyle = g;
    roundRect(d.x-pw/2, baseY-d.h, pw, d.h, 10); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.font = '600 44px Fredoka, sans-serif';
    ctx.fillText(String(d.rank), d.x, baseY-d.h/2);
    if(s){
      var bounce = d.rank===1 ? Math.abs(Math.sin(t/350))*8 : 0;
      drawMiniSnake(d.x, baseY-d.h-6-bounce, s.skin, 1.05, t);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '700 19px "Noto Sans TC", sans-serif';
      ctx.fillText(s.name, d.x, baseY+26);
      ctx.fillStyle = '#C9DCC0';
      ctx.font = '500 15px "Noto Sans TC", sans-serif';
      ctx.fillText('長度 ' + (s.alive?len(s):s.finalLen), d.x, baseY+48);
    }
  });
  ctx.textAlign='left';
}
function render(tNow){
  var dt = lastFrame ? Math.min(50, tNow-lastFrame) : 16;
  lastFrame = tNow;
  drawBoard();
  if(state==='play' || state==='paused' || state==='over' || state==='results'){
    foods.forEach(function(f){ drawApple(f, tNow); });
    drawSpecial(tNow);
    drawRings(tNow);
    drawParticles(state==='play' ? dt : 0);
    var it = (state!=='play') ? 1 : Math.min(1, (tNow-lastTick)/delay());
    snakes.forEach(function(s){ if(s.alive) drawSnake(s, tNow, it); });
    drawHudPanels(tNow);
    if(state==='results') drawPodium(tNow);
  }
  requestAnimationFrame(render);
}

var selSkin = 0;
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function renderMembers(){
  var list = $('member-list');
  if(!list) return;
  list.innerHTML = '';
  if(mode!=='multi'){ return; }
  var pids = Object.keys(roomPlayers);
  pids.sort(function(a,b){ return (roomPlayers[a].joined||0)-(roomPlayers[b].joined||0); });
  var allConfirmed = pids.length >= 2 && pids.every(function(pid){
    return roomPlayers[pid] && roomPlayers[pid].confirmed;
  });
  pids.forEach(function(pid){
    var p = roomPlayers[pid];
    var row = document.createElement('div');
    row.className = 'member-row';
    var tag = '';
    if(pid===fb.pid) tag += '(你)';
    if(pid===hostPid()) tag += '(房主)';
    var checkmark = p.confirmed ? ' <span style="color:#7FE0A0;font-size:14px">✔</span>' : '';
    row.innerHTML = '<span class="dot" style="background:' + SKINS[p.skin||0].body + '"></span>' +
                    '<span>' + escapeHtml(p.name||'玩家') + checkmark + '</span>' +
                    (tag ? '<span class="you">' + tag + '</span>' : '');
    list.appendChild(row);
  });
  if(pids.length <= 1){
    var w = document.createElement('div');
    w.className = 'member-row waiting';
    w.textContent = '把包廂號碼分享給朋友加入…';
    list.appendChild(w);
  }
  /* 重新渲染角色格(更新鎖定狀態) */
  buildSkinGrid();
  var canStart = isHost && pids.length >= 2;
  $('bt-start').classList.toggle('hidden', mode==='multi' && !isHost);
  $('lobby-wait').classList.toggle('hidden', !(mode==='multi' && !isHost));
  $('bt-start').disabled = (mode==='multi' && !canStart);
  $('bt-start').style.opacity = $('bt-start').disabled ? 0.45 : 1;
  $('bt-start').title = canStart ? '' : '等待更多玩家加入…';
}
var _hostPid = null;
function hostPid(){
  if(isHost) return fb.pid;
  return _hostPid;
}

var myConfirmed = false;

function takenSkins(){
  if(mode!=='multi') return [];
  return Object.keys(roomPlayers)
    .filter(function(pid){ return pid !== fb.pid; })
    .map(function(pid){ return roomPlayers[pid].skin||0; });

function buildSkinGrid(){
  var grid = $('skin-grid');
  grid.innerHTML = '';
  var taken = takenSkins();
  SKINS.forEach(function(sk, i){
    var isLocked = taken.indexOf(i) >= 0;
    var isSel = (i===selSkin);
    var isConfirmed = isSel && myConfirmed;
    var cls = 'skin';
    if(isSel) cls += ' sel';
    if(isLocked) cls += ' locked';
    if(isConfirmed) cls += ' confirmed-badge';
    var div = document.createElement('div');
    div.className = cls;
    var cv = document.createElement('canvas');
    cv.width = 128; cv.height = 72;
    var c2 = cv.getContext('2d');
    c2.lineCap='round'; c2.lineJoin='round';
    c2.strokeStyle = sk.body; c2.lineWidth = 22;
    c2.beginPath();
    c2.moveTo(18,52);
    c2.quadraticCurveTo(50,18,72,40);
    c2.quadraticCurveTo(90,56,106,38);
    c2.stroke();
    c2.fillStyle='#FFF';
    c2.beginPath(); c2.arc(102,30,5,0,Math.PI*2); c2.arc(112,32,5,0,Math.PI*2); c2.fill();
    c2.fillStyle=sk.pupil;
    c2.beginPath(); c2.arc(103,29,2.6,0,Math.PI*2); c2.arc(113,31,2.6,0,Math.PI*2); c2.fill();
    var sp = document.createElement('span');
    sp.textContent = sk.name;
    div.appendChild(cv); div.appendChild(sp);
    if(!isLocked && !myConfirmed){
      div.addEventListener('click', function(){
        selSkin = i;
        buildSkinGrid();
        syncMyProfile();
      });
    }
    grid.appendChild(div);
  });
  /* 更新確認按鈕狀態 */
  var btnC = $('bt-confirm');
  if(btnC){
    if(myConfirmed){
      btnC.textContent = '✔ 已確認角色';
      btnC.classList.add('done');
    } else {
      btnC.textContent = '✔ 確認角色';
      btnC.classList.remove('done');
    }
  }
}

/* ============ 倒數 3-2-1-GO ============ */
function runCountdown(callback){
  var overlay = $('cd-overlay');
  var numEl = $('cd-num');
  overlay.classList.add('show');
  var count = 3;
  numEl.className = 'countdown-num';
  numEl.textContent = String(count);

  function tick(){
    /* 縮小+淡出動畫 */
    numEl.classList.add('pop');
    setTimeout(function(){
      count--;
      numEl.classList.remove('pop');
      if(count > 0){
        numEl.textContent = String(count);
        setTimeout(tick, 700);
      } else {
        numEl.textContent = '';
        var go = document.createElement('div');
        go.className = 'countdown-go';
        go.textContent = 'GO!';
        overlay.appendChild(go);
        setTimeout(function(){
          overlay.classList.remove('show');
          overlay.innerHTML = '<div class="countdown-num" id="cd-num">3</div>';
          callback();
        }, 600);
      }
    }, 150);
  }
  setTimeout(tick, 600);
}

/* ============ 開局(單人) ============ */
function startSingleGame(){
  resetWorld();
  singleScore = 0; singleLevel = 1;
  var spawnIdx = [];
  for(var k=0;k<8;k++) spawnIdx.push(k);
  spawnIdx.sort(function(){ return Math.random()-0.5; });
  player = makeSnake(myName()||'玩家', selSkin, SPAWNS[spawnIdx[0]], null);
  snakes = [player];
  var bots = parseInt($('in-bots').value, 10) || 0;
  var order = [];
  for(var i=0;i<8;i++) if(i!==selSkin) order.push(i);
  order.sort(function(){ return Math.random()-0.5; });
  var botNames = ['小青','阿斑','滑滑','長長','咕溜','尾尾','圈圈'];
  for(var b=0;b<bots;b++){
    var s = makeSnake(botNames[b%botNames.length], order[b%order.length], SPAWNS[spawnIdx[b+1]], null);
    s.isAI = true;
    snakes.push(s);
  }
  replenishFoods();
  $('wrap-bar').classList.remove('hidden');
  /* 先顯示棋盤(蛇的起始位置)再倒數 */
  state = 'play';
  show(null);
  lastTick = now();
  updateHud();
  runCountdown(function(){
    restartTimer();
  });
}

$('bt-leave-dead').addEventListener('click', function(){
  if(mode==='multi') leaveRoom(); else goHome();
});
$('bt-resume').addEventListener('click', togglePause);
$('wrap-toggle').addEventListener('change', function(e){ wrap = e.target.checked; });

function togglePause(){
  if(mode!=='single') return;
  if(state!=='play' && state!=='paused') return;
  if(state==='play'){
    state = 'paused';
    pausedAt = now();
    clearInterval(timer);
    show('sc-pause');
  } else {
    var d = now()-pausedAt;
    snakes.forEach(function(s){
      s.invUntil += d; s.mouthUntil += d;
      if(s.stunUntil) s.stunUntil += d;
      if(s.face.until) s.face.until += d;
    });
    if(special) special.expireAt += d;
    fxRings.forEach(function(f){ f.t += d; });
    lastTick += d;
    state = 'play';
    show(null);
    restartTimer();
  }
}

function pushDir(name){
  if(!player || !player.alive) return;
  var map = {up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0}};
  var d = map[name];
  if(!d) return;
  if(player.queue.length<2) player.queue.push(d);
  if(mode==='multi' && !isHost){
    /* 透過 Ably 傳給房主（低延遲） */
    if(ablyChannel) ablyChannel.publish('input', {pid:fb.pid, x:d.x, y:d.y});
    /* Firebase 備援 */
    if(roomRef) roomRef.child('inputs/'+fb.pid).set({x:d.x, y:d.y, t:Date.now()});
  }
}

document.addEventListener('keydown', function(e){
  var keys = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
              w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right'};
  var typing = document.activeElement && document.activeElement.tagName === 'INPUT';
  if(keys[e.key] && !typing){
    if(state==='play'){ e.preventDefault(); pushDir(keys[e.key]); }
  } else if(e.key===' ' && !typing){
    if(mode==='single' && (state==='play'||state==='paused')){ e.preventDefault(); togglePause(); }
  }
});
Array.prototype.forEach.call(document.querySelectorAll('[data-dir]'), function(btn){
  btn.addEventListener('click', function(){
    if(state==='play') pushDir(btn.getAttribute('data-dir'));
  });
});
$('pause-btn').addEventListener('click', function(){
  if(mode==='single' && (state==='play'||state==='paused')) togglePause();
});

var touchStart = null;
canvas.addEventListener('touchstart', function(e){
  touchStart = {x:e.touches[0].clientX, y:e.touches[0].clientY};
}, {passive:true});
canvas.addEventListener('touchend', function(e){
  if(!touchStart) return;
  var dx = e.changedTouches[0].clientX - touchStart.x;
  var dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;
  if(state!=='play') return;
  if(Math.abs(dx)<24 && Math.abs(dy)<24) return;
  if(Math.abs(dx)>Math.abs(dy)) pushDir(dx>0?'right':'left');
  else pushDir(dy>0?'down':'up');
});

window.addEventListener('beforeunload', function(){
  if(roomRef){
    if(isHost) roomRef.remove();
    else if(myPlayerRef) myPlayerRef.remove();
  }
});

/* ============ 啟動 ============ */
/* 讀取上次名字 */
(function(){
  try {
    var saved = localStorage.getItem('snake-name');
    if(saved) $('global-name').value = saved;
  } catch(e){}
})();
$('global-name').addEventListener('input', function(){
  this.style.borderColor = '';
  syncMyProfile();
  try { if(this.value.trim()) localStorage.setItem('snake-name', this.value.trim()); } catch(e){}
});
$('switch-player').addEventListener('click', function(){
  var inp = $('global-name');
  inp.value = '';
  inp.style.borderColor = '';
  inp.focus();
  try { localStorage.removeItem('snake-name'); } catch(e){}
});

buildSkinGrid();
show('sc-home');
updateHud();
requestAnimationFrame(render);
})();

</script>
